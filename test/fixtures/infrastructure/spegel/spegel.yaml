apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: spegel
  namespace: flux-system
spec:
  url: https://charts.spegel.dev
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: spegel
  namespace: flux-system
spec:
  chart:
    spec:
      chart: spegel
      version: 1.2.3
      sourceRef:
        kind: HelmRepository
        name: spegel
  values:
    containerRuntime: containerd
